<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список студентов</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        .bg-primary-custom {
            background-color: #007bb1;
        }
        
        .bg-secondary-custom {
            background-color: #b42c0f;
        }
        
        .bg-dark-custom {
            background-color: #e08920;
        }
        
        .btn-primary-custom {
            background-color: #007bb1;
            border-color: #007bb1;
            color: white;
        }
        
        .btn-primary-custom:hover {
            background-color: #069fc2;
            border-color: #069fc2;
        }
        
        .table-dark-custom {
            background-color: #e08920;
            color: white;
        }
        
        .table-striped-custom > tbody > tr:nth-of-type(odd) {
            background-color: #ecf4b8;
        }
        
        .table-striped-custom > tbody > tr:nth-of-type(even) {
            background-color: #007bb1;
            color: white;
        }
        
        .table-striped-custom > tbody > tr:hover {
            background-color: #069fc2;
            color: white;
        }
        
        .card-header-custom {
            background-color: #007bb1;
            color: white;
        }
        
        .text-primary-custom {
            color: #007bb1;
        }
        
        .border-custom {
            border-color: #ecf4b8;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4 text-primary-custom">Панель управления студентами</h1>
        
        <div class="card mb-4 border-custom">
            <div class="card-header bg-primary-custom text-white">
                <h5 class="mb-0">Добавить нового студента</h5>
            </div>
            <div class="card-body">
                <div id="formErrors" class="alert alert-danger d-none"></div>
                
                <form id="addStudentForm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="surname" class="form-label">Фамилия</label>
                            <input type="text" class="form-control" id="surname" required>
                        </div>
                        <div class="col-md-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="col-md-3">
                            <label for="middleName" class="form-label">Отчество</label>
                            <input type="text" class="form-control" id="middleName" required>
                        </div>
                        <div class="col-md-3">
                            <label for="birthDate" class="form-label">Дата рождения</label>
                            <input type="date" class="form-control" id="birthDate" required>
                        </div>
                        <div class="col-md-3">
                            <label for="startYear" class="form-label">Год начала обучения</label>
                            <input type="number" class="form-control" id="startYear" min="2000" required>
                        </div>
                        <div class="col-md-3">
                            <label for="faculty" class="form-label">Факультет</label>
                            <input type="text" class="form-control" id="faculty" required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary-custom w-100">Добавить студента</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="card mb-4 border-custom">
            <div class="card-header bg-secondary-custom text-white">
                <h5 class="mb-0">Фильтры</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="filterFio" class="form-label">Ф.И.О. (поиск подстроки)</label>
                        <input type="text" class="form-control" id="filterFio" placeholder="Введите часть ФИО">
                    </div>
                    <div class="col-md-3">
                        <label for="filterFaculty" class="form-label">Факультет (поиск подстроки)</label>
                        <input type="text" class="form-control" id="filterFaculty" placeholder="Введите часть названия">
                    </div>
                    <div class="col-md-3">
                        <label for="filterStartYear" class="form-label">Год начала обучения (точно)</label>
                        <input type="number" class="form-control" id="filterStartYear" placeholder="2000-2026">
                    </div>
                    <div class="col-md-3">
                        <label for="filterEndYear" class="form-label">Год окончания обучения (точно)</label>
                        <input type="number" class="form-control" id="filterEndYear" placeholder="2004-2030">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card border-custom">
            <div class="card-header bg-dark-custom text-white">
                <h5 class="mb-0">Список студентов</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped-custom mb-0">
                        <thead class="table-dark-custom">
                            <tr>
                                <th class="sortable" data-sort="fio" style="cursor: pointer;">Ф.И.О. ↕</th>
                                <th class="sortable" data-sort="faculty" style="cursor: pointer;">Факультет ↕</th>
                                <th class="sortable" data-sort="birthDate" style="cursor: pointer;">Дата рождения и возраст ↕</th>
                                <th class="sortable" data-sort="startYear" style="cursor: pointer;">Годы обучения и курс ↕</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
